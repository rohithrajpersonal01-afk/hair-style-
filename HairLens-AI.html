<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HairLens AI — Hairstyle Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════════════════════
   HairLens AI — Styles
   Theme: Tech-Noir / Cyberpunk-lite
═══════════════════════════════════════════════════════ */
:root {
  --bg:          #070b10;
  --bg-2:        #0d1520;
  --bg-3:        #111d2e;
  --surface:     #0f1c2e;
  --surface-2:   #162336;
  --border:      #1e3a5f;
  --border-glow: #00c8ff44;
  --accent:      #00c8ff;
  --accent-2:    #7b2fff;
  --accent-3:    #ff3cac;
  --gold:        #f5c842;
  --text-1:      #e8f4ff;
  --text-2:      #8ab0cc;
  --text-3:      #4a7090;
  --font-display: 'Orbitron', monospace;
  --font-body:    'Syne', sans-serif;
  --radius:      12px;
  --radius-lg:   20px;
  --shadow-glow: 0 0 30px #00c8ff22, 0 0 60px #00c8ff0a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  background-image: radial-gradient(ellipse 80% 50% at 50% -10%, #00c8ff0a 0%, transparent 60%);
}

/* ── Header ── */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
  background: #070b10dd;
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 1.4rem;
  letter-spacing: .05em;
}
.logo em { color: var(--accent); font-style: normal; }
.logo-icon {
  color: var(--accent);
  font-size: 1.5rem;
  text-shadow: 0 0 16px var(--accent);
  animation: pulseGlow 3s ease-in-out infinite;
}
.tagline {
  font-family: var(--font-display);
  font-size: .6rem;
  letter-spacing: .2em;
  color: var(--text-3);
  text-transform: uppercase;
}

/* ── Main ── */
main {
  max-width: 920px;
  margin: 0 auto;
  padding: 36px 20px 80px;
}

/* ── Sections (JS controls display) ── */
#camera-section  { display: block; }
#results-section { display: none; }

/* ── Step Label ── */
.step-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: .68rem;
  letter-spacing: .2em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.step-label span {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: .6rem;
}

/* ═══════════════════════════════════
   CAMERA WRAPPER
═══════════════════════════════════ */
.camera-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  aspect-ratio: 3/4;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-glow), inset 0 0 40px #00000055;
}
#videoFeed {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.cam-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(#00c8ff18 1px, transparent 1px),
    linear-gradient(90deg, #00c8ff18 1px, transparent 1px);
  background-size: 25% 25%;
  pointer-events: none;
}
.bracket {
  position: absolute;
  width: 28px; height: 28px;
  border-color: var(--accent);
  border-style: solid;
  pointer-events: none;
}
.bracket.tl { top:14px; left:14px;   border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
.bracket.tr { top:14px; right:14px;  border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
.bracket.bl { bottom:14px; left:14px;  border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
.bracket.br { bottom:14px; right:14px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }
.scan-line {
  position: absolute;
  left:0; right:0; height:2px;
  background: linear-gradient(90deg,transparent,var(--accent),transparent);
  box-shadow: 0 0 12px var(--accent);
  animation: scan 3s linear infinite;
  pointer-events: none;
  display: none;
}

/* ── Camera overlays ── */
.cam-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: #070b10ee;
  text-align: center;
  padding: 32px;
  z-index: 10;
}
.cam-overlay__icon {
  font-size: 2.8rem;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent);
  animation: pulseGlow 2s ease-in-out infinite;
}
.cam-overlay p { color: var(--text-2); font-size: .9rem; }
.cam-overlay .err-icon { font-size: 2.2rem; color: var(--accent-3); }

/* ═══════════════════════════════════
   BUTTONS
═══════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  border: none;
  font-family: var(--font-display);
  font-size: .68rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-radius: var(--radius);
  transition: all .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

.btn-glow {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  padding: 12px 28px;
  font-weight: 600;
  box-shadow: 0 0 20px #00c8ff44, 0 4px 20px #00000055;
}
.btn-glow:hover { transform:translateY(-2px); box-shadow:0 0 32px #00c8ff66, 0 8px 30px #00000055; }
.btn-glow:active { transform:translateY(0); }

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 10px 20px;
}
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 12px #00c8ff22; }

.btn-sm { padding: 8px 16px; font-size: .62rem; }

.btn-wide { width:100%; max-width:360px; justify-content:center; }

.btn-icon {
  flex-direction: column;
  gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 12px 18px;
  min-width: 68px;
  font-size: .58rem;
}
.btn-icon svg { width:20px; height:20px; }
.btn-icon:hover { border-color:var(--accent); color:var(--accent); }

/* ── Capture shutter button ── */
.btn-capture {
  position: relative;
  width: 72px; height: 72px;
  border-radius: 50%;
  background: transparent;
  border: 3px solid var(--accent);
  box-shadow: 0 0 24px #00c8ff55;
  padding: 0;
  cursor: pointer;
  transition: all .15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-capture:hover { box-shadow:0 0 36px #00c8ff88; transform:scale(1.05); }
.capture-ring {
  position:absolute; inset:4px; border-radius:50%;
  border:1px solid #00c8ff44;
}
.capture-dot {
  width:46px; height:46px; border-radius:50%;
  background: var(--accent);
  box-shadow: 0 0 16px var(--accent);
  transition: transform .15s ease;
}
.btn-capture:active .capture-dot { transform:scale(1.15); }

/* ── Camera controls row ── */
.camera-controls {
  display: none; /* shown by JS */
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-top: 24px;
}

/* ── Captured preview ── */
.preview-wrapper {
  display: none; /* shown by JS */
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 28px;
  animation: slideUp .4s ease;
}
.captured-frame {
  width: 100%;
  max-width: 260px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-glow);
}
.captured-frame img { width:100%; display:block; object-fit:cover; }

.btn-sparkle { color:var(--gold); font-size:.9rem; animation:twinkle 2s ease-in-out infinite alternate; }

/* ═══════════════════════════════════
   RESULTS
═══════════════════════════════════ */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 28px;
}
.results-actions { display:flex; gap:10px; flex-wrap:wrap; }

/* ── Loading ── */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 60px 20px;
}
.loader-orb {
  position:relative; width:80px; height:80px;
  display:flex; align-items:center; justify-content:center;
}
.orb-ring {
  position:absolute; inset:0; border-radius:50%;
  border:2px solid transparent;
}
.r1 { border-top-color:var(--accent);   animation:spin 1.2s linear infinite; }
.r2 { inset:8px;  border-right-color:var(--accent-2); animation:spin 1.8s linear infinite reverse; }
.r3 { inset:16px; border-bottom-color:var(--accent-3); animation:spin 2.4s linear infinite; }
.orb-icon { color:var(--accent); font-size:1.2rem; text-shadow:0 0 12px var(--accent); animation:pulseGlow 1.5s ease-in-out infinite; }

.loading-text {
  font-family:var(--font-display); font-size:.72rem;
  letter-spacing:.15em; color:var(--text-2); text-transform:uppercase;
  animation:blink .9s ease-in-out infinite alternate;
}
.loading-bar-track {
  width:260px; height:3px;
  background:var(--surface-2); border-radius:99px; overflow:hidden;
}
.loading-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  border-radius:99px; box-shadow:0 0 8px var(--accent);
  transition:width .3s ease;
}

/* ── Hairstyle grid ── */
.hairstyle-grid {
  display: none; /* toggled by JS */
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  animation: fadeIn .5s ease;
}
.hairstyle-card {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  animation: cardPop .4s cubic-bezier(.34,1.56,.64,1) both;
}
.hairstyle-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px #00000066, 0 0 20px var(--border-glow);
  border-color: var(--accent);
}
.card-img-wrap {
  position:relative; aspect-ratio:3/4; overflow:hidden; background:var(--bg-3);
}
.card-img-wrap img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform .3s ease;
}
.hairstyle-card:hover .card-img-wrap img { transform:scale(1.04); }
.card-badge {
  position:absolute; top:8px; left:8px;
  background:#070b10cc;
  border:1px solid var(--border);
  border-radius:4px;
  font-family:var(--font-display); font-size:.5rem;
  letter-spacing:.1em; color:var(--accent);
  padding:2px 6px; text-transform:uppercase;
  backdrop-filter:blur(4px);
}
.card-info { padding:10px 10px 6px; }
.card-name {
  font-family:var(--font-display); font-size:.58rem;
  letter-spacing:.08em; color:var(--text-1); text-transform:uppercase;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-dl {
  width:100%; margin-top:8px;
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--text-2); padding:7px;
  border-radius:6px;
  font-family:var(--font-display); font-size:.54rem;
  letter-spacing:.1em; text-transform:uppercase;
  cursor:pointer; transition:all .2s ease;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.card-dl:hover { background:var(--accent); border-color:var(--accent); color:var(--bg); box-shadow:0 0 14px #00c8ff55; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:32px; left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--surface-2); border:1px solid var(--accent);
  color:var(--text-1); padding:12px 24px;
  border-radius:var(--radius);
  font-family:var(--font-display); font-size:.62rem;
  letter-spacing:.12em; text-transform:uppercase;
  box-shadow:0 0 20px #00c8ff33, 0 8px 30px #00000066;
  opacity:0; pointer-events:none;
  transition:all .3s ease; z-index:999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════
   ANIMATIONS
═══════════════════════════════════ */
@keyframes scan     { 0%{top:-4px} 100%{top:100%} }
@keyframes pulseGlow{ 0%,100%{opacity:1;text-shadow:0 0 16px var(--accent)} 50%{opacity:.7;text-shadow:0 0 32px var(--accent),0 0 60px var(--accent-2)} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes slideUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardPop  { from{opacity:0;transform:scale(.85) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes twinkle  { from{opacity:.5;transform:scale(.9)} to{opacity:1;transform:scale(1.1)} }
@keyframes blink    { from{opacity:.5} to{opacity:1} }

/* ═══════════════════════════════════
   RESPONSIVE
═══════════════════════════════════ */
@media (max-width: 700px) {
  .hairstyle-grid { grid-template-columns:repeat(2,1fr); }
  .site-header    { padding:14px 18px; }
  main            { padding:22px 14px 60px; }
  .camera-wrapper { max-width:100%; }
}
@media (max-width: 420px) {
  .logo   { font-size:1.1rem; }
  .tagline{ display:none; }
  .results-header{ flex-direction:column; align-items:flex-start; }
}
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="site-header">
  <div class="logo">
    <span class="logo-icon">◈</span>
    <span>Hair<em>Lens</em></span>
  </div>
  <p class="tagline">AI Hairstyle Simulator</p>
</header>

<main>

  <!-- ══ SECTION 1: Camera ══ -->
  <section id="camera-section">

    <div class="step-label"><span>01</span> Capture Your Photo</div>

    <!-- Camera viewport -->
    <div class="camera-wrapper" id="cameraWrapper">
      <video id="videoFeed" autoplay playsinline muted></video>
      <div class="cam-grid"></div>
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
      <div class="scan-line" id="scanLine"></div>

      <!-- Permission prompt -->
      <div class="cam-overlay" id="camPrompt">
        <div class="cam-overlay__icon">◎</div>
        <p>Use your camera or upload a photo</p>
        <p id="promptNote" style="display:none;font-size:.75rem;color:#ff3cac;margin-top:-6px;">&#9888; Camera needs localhost/HTTPS &mdash; use Upload instead</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
          <button class="btn btn-glow" id="startCamBtn">&#128247; Camera</button>
          <button class="btn btn-ghost" id="uploadBtn">&#128444; Upload Photo</button>
        </div>
      </div>

      <!-- Error overlay (hidden by default) -->
      <div class="cam-overlay" id="camError" style="display:none;">
        <div class="err-icon">&#9888;</div>
        <p id="camErrorMsg">Camera access denied.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;">
          <button class="btn btn-ghost btn-sm" id="retryCamBtn">&#8635; Retry Camera</button>
          <button class="btn btn-glow btn-sm" id="retryUploadBtn">&#128444; Upload Photo</button>
        </div>
      </div>

      <!-- Hidden file input for photo uploads -->
      <input type="file" id="uploadInput" accept="image/*" style="display:none;" />
    </div>

    <!-- Camera controls (hidden until stream is live) -->
    <div class="camera-controls" id="cameraControls">
      <button class="btn btn-icon" id="switchCamBtn" title="Switch Camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        <span>Flip</span>
      </button>

      <button class="btn btn-capture" id="captureBtn" title="Capture">
        <span class="capture-ring"></span>
        <span class="capture-dot"></span>
      </button>

      <button class="btn btn-icon" id="retakeBtn" title="Retake" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.68"/>
        </svg>
        <span>Retake</span>
      </button>
    </div>

    <!-- Hidden canvas for image capture -->
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <!-- Captured image preview -->
    <div class="preview-wrapper" id="previewWrapper">
      <div class="step-label" style="margin-top:0;margin-bottom:0;"><span>✓</span> Captured</div>
      <div class="captured-frame">
        <img id="capturedImage" src="" alt="Captured photo" />
      </div>
      <button class="btn btn-glow btn-wide" id="generateBtn">
        <span class="btn-sparkle">✦</span>
        Generate Hairstyles
        <span class="btn-sparkle">✦</span>
      </button>
    </div>

  </section>

  <!-- ══ SECTION 2: Results ══ -->
  <section id="results-section">

    <div class="results-header">
      <div class="step-label" style="margin-bottom:0;"><span>02</span> Your Hairstyle Variations</div>
      <div class="results-actions">
        <button class="btn btn-ghost btn-sm" id="newPhotoBtn">← New Photo</button>
        <button class="btn btn-glow btn-sm" id="downloadAllBtn">⬇ Download All</button>
      </div>
    </div>

    <!-- Loader -->
    <div id="loadingState" class="loading-state">
      <div class="loader-orb">
        <div class="orb-ring r1"></div>
        <div class="orb-ring r2"></div>
        <div class="orb-ring r3"></div>
        <span class="orb-icon">◈</span>
      </div>
      <p class="loading-text" id="loadingText">Initialising AI engine…</p>
      <div class="loading-bar-track"><div class="loading-bar" id="loadingBar"></div></div>
    </div>

    <!-- Grid -->
    <div class="hairstyle-grid" id="hairstyleGrid"></div>

  </section>

</main>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   HairLens AI — script.js
   Camera fixes:
   • Detects file:// protocol → skips camera, shows upload fallback
   • Properly waits for video.play() promise before showing controls
   • Retries with basic constraints if ideal constraints fail
   • Upload-photo fallback always available via hidden file input
═══════════════════════════════════════════════════════ */

/* ── DOM refs ── */
const videoFeed      = document.getElementById('videoFeed');
const captureCanvas  = document.getElementById('captureCanvas');
const capturedImage  = document.getElementById('capturedImage');
const cameraControls = document.getElementById('cameraControls');
const camPrompt      = document.getElementById('camPrompt');
const camError       = document.getElementById('camError');
const camErrorMsg    = document.getElementById('camErrorMsg');
const previewWrapper = document.getElementById('previewWrapper');
const hairstyleGrid  = document.getElementById('hairstyleGrid');
const loadingState   = document.getElementById('loadingState');
const loadingBar     = document.getElementById('loadingBar');
const loadingText    = document.getElementById('loadingText');
const scanLine       = document.getElementById('scanLine');
const uploadInput    = document.getElementById('uploadInput');

const startCamBtn    = document.getElementById('startCamBtn');
const uploadBtn      = document.getElementById('uploadBtn');
const retryCamBtn    = document.getElementById('retryCamBtn');
const retryUploadBtn = document.getElementById('retryUploadBtn');
const captureBtn     = document.getElementById('captureBtn');
const switchCamBtn   = document.getElementById('switchCamBtn');
const retakeBtn      = document.getElementById('retakeBtn');
const generateBtn    = document.getElementById('generateBtn');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const newPhotoBtn    = document.getElementById('newPhotoBtn');

const cameraSection  = document.getElementById('camera-section');
const resultsSection = document.getElementById('results-section');
const toastEl        = document.getElementById('toast');

/* ── State ── */
let currentStream   = null;
let facingMode      = 'user';
let capturedDataURL = null;
let generatedImages = [];
let usingCamera     = false;  // true = live camera, false = uploaded image

/* ── Hairstyle definitions ── */
const HAIRSTYLES = [
  { id:'short',    name:'Short Hair',    emoji:'✂️',  filter:'contrast(1.1) saturate(1.1)',                    tint:null,        overlay:'vignette' },
  { id:'long',     name:'Long Hair',     emoji:'🌿',  filter:'brightness(1.05) saturate(1.2)',                 tint:null,        overlay:'warm'     },
  { id:'curly',    name:'Curly Hair',    emoji:'🌀',  filter:'contrast(1.15) brightness(1.02)',                tint:null,        overlay:'vignette' },
  { id:'straight', name:'Straight Hair', emoji:'📏',  filter:'brightness(1.08) contrast(0.95) saturate(0.9)', tint:null,        overlay:'cool'     },
  { id:'buzz',     name:'Buzz Cut',      emoji:'⚡',  filter:'contrast(1.3) saturate(0.8) brightness(0.95)',  tint:null,        overlay:'bw'       },
  { id:'ponytail', name:'Ponytail',      emoji:'🎀',  filter:'brightness(1.1) saturate(1.3)',                 tint:'#ff9aa244', overlay:'warm'     },
  { id:'wavy',     name:'Wavy Hair',     emoji:'🌊',  filter:'saturate(1.4) brightness(1.04)',                tint:'#4fc3f744', overlay:'cool'     },
  { id:'colored',  name:'Colored Hair',  emoji:'🎨',  filter:'saturate(2) hue-rotate(30deg) brightness(1.1)', tint:'#ff3cac33', overlay:'vivid'    },
  { id:'undercut', name:'Undercut',      emoji:'🔪',  filter:'contrast(1.4) saturate(0.7)',                   tint:null,        overlay:'bw'       },
  { id:'formal',   name:'Formal Style',  emoji:'🎩',  filter:'contrast(1.1) saturate(0.85) brightness(0.97)', tint:'#1a237e22', overlay:'cool'     },
];

/* ════════════════════════════════
   CAMERA
════════════════════════════════ */

/**
 * Check whether camera API is even available.
 * It is blocked on file:// and on non-secure origins.
 */
function cameraAvailable() {
  return !!(
    navigator.mediaDevices &&
    typeof navigator.mediaDevices.getUserMedia === 'function' &&
    (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  );
}

async function initCamera() {
  if (!cameraAvailable()) {
    showOverlay(camError);
    hideOverlay(camPrompt);
    camErrorMsg.textContent =
      location.protocol === 'file:'
        ? 'Camera does not work when opened as a local file. Use the "Upload Photo" button instead, or serve this file via a local server (e.g. VS Code Live Server).'
        : 'Camera requires HTTPS. Use the "Upload Photo" button below to continue.';
    return;
  }

  showOverlay(camPrompt);
  hideOverlay(camError);

  try {
    stopStream();

    /* First try with ideal constraints */
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false,
      });
    } catch (constraintErr) {
      /* Fall back to minimal constraints */
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      facingMode = 'user'; // unknown after fallback
    }

    currentStream = stream;
    usingCamera   = true;

    /* Assign stream and wait for it to be ready */
    videoFeed.srcObject = stream;
    await videoFeed.play().catch(() => {}); /* some browsers auto-play; ignore error */

    hideOverlay(camPrompt);
    hideOverlay(camError);
    cameraControls.style.display = 'flex';
    scanLine.style.display       = 'block';

  } catch (err) {
    handleCameraError(err);
  }
}

function handleCameraError(err) {
  stopStream();
  hideOverlay(camPrompt);
  showOverlay(camError);
  const msgs = {
    NotAllowedError:       'Camera access denied. Click "Allow" when the browser asks, then retry. Or use "Upload Photo".',
    PermissionDeniedError: 'Camera permission denied. Check your browser site settings, then retry.',
    NotFoundError:         'No camera detected on this device. Use "Upload Photo" instead.',
    NotReadableError:      'Camera is already in use by another application.',
    OverconstrainedError:  'Camera hardware does not meet the requested constraints.',
    AbortError:            'Camera access was aborted. Please retry.',
  };
  camErrorMsg.textContent = msgs[err.name] || `Camera error (${err.name}): ${err.message}`;
  console.error('[HairLens] Camera error:', err.name, err.message);
}

function stopStream() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
}

function switchCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  initCamera();
  showToast(`Switched to ${facingMode === 'user' ? 'front' : 'back'} camera`);
  switchCamBtn.style.transform = 'rotate(180deg)';
  setTimeout(() => { switchCamBtn.style.transform = ''; }, 400);
}

/* ════════════════════════════════
   UPLOAD FALLBACK
════════════════════════════════ */
function triggerUpload() {
  uploadInput.click();
}

uploadInput.addEventListener('change', () => {
  const file = uploadInput.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    showToast('Please select an image file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    usingCamera = false;
    stopStream();
    /* Show a still image in the video area */
    videoFeed.style.display = 'none';
    const existingStill = document.getElementById('uploadedStill');
    if (existingStill) existingStill.remove();
    const still = document.createElement('img');
    still.id = 'uploadedStill';
    still.src = e.target.result;
    still.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    document.getElementById('cameraWrapper').insertBefore(still, document.getElementById('camError'));

    hideOverlay(camPrompt);
    hideOverlay(camError);
    cameraControls.style.display = 'flex';
    scanLine.style.display       = 'none';
    switchCamBtn.style.display   = 'none'; /* no switching for uploads */

    /* Pre-load the captured data from the upload */
    capturedDataURL = e.target.result;
    capturedImage.src = capturedDataURL;
    previewWrapper.style.display = 'flex';
    captureBtn.style.display = 'none';
    retakeBtn.style.display  = 'flex';
    showToast('Photo uploaded! Click "Generate Hairstyles".');
  };
  reader.readAsDataURL(file);
  uploadInput.value = ''; /* reset so same file can be re-selected */
});

/* ════════════════════════════════
   CAPTURE (live camera)
════════════════════════════════ */
function captureImage() {
  if (!usingCamera || !currentStream) return;

  const w = videoFeed.videoWidth  || 640;
  const h = videoFeed.videoHeight || 480;
  captureCanvas.width  = w;
  captureCanvas.height = h;

  const ctx = captureCanvas.getContext('2d');
  /* Mirror front-camera to match the preview */
  if (facingMode === 'user') {
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(videoFeed, 0, 0, w, h);
  capturedDataURL = captureCanvas.toDataURL('image/jpeg', 0.92);

  capturedImage.src            = capturedDataURL;
  previewWrapper.style.display = 'flex';
  captureBtn.style.display     = 'none';
  retakeBtn.style.display      = 'flex';
  scanLine.style.animationPlayState = 'paused';
  showToast('Photo captured!');
}

function retakePhoto() {
  capturedDataURL              = null;
  capturedImage.src            = '';
  previewWrapper.style.display = 'none';
  retakeBtn.style.display      = 'none';

  if (usingCamera) {
    captureBtn.style.display              = 'flex';
    scanLine.style.animationPlayState     = 'running';
  } else {
    /* For uploads: show camera view and restart camera prompt */
    const still = document.getElementById('uploadedStill');
    if (still) still.remove();
    videoFeed.style.display    = 'block';
    captureBtn.style.display   = 'none';   /* no live capture without stream */
    switchCamBtn.style.display = 'flex';
    scanLine.style.display     = 'none';
    cameraControls.style.display = 'none';
    showOverlay(camPrompt);
  }
}

/* ════════════════════════════════
   HAIRSTYLE GENERATION
════════════════════════════════ */
async function generateHairstyles() {
  if (!capturedDataURL) {
    showToast('Please capture or upload a photo first!');
    return;
  }

  cameraSection.style.display  = 'none';
  resultsSection.style.display = 'block';
  loadingState.style.display   = 'flex';
  hairstyleGrid.style.display  = 'none';
  loadingBar.style.width       = '0%';
  generatedImages              = [];

  const msgs = [
    'Initialising AI engine…',
    'Analysing facial structure…',
    'Sampling hairstyle database…',
    'Rendering variations…',
    'Applying finishing touches…',
  ];
  let mi = 0;
  const msgTimer = setInterval(() => {
    loadingText.textContent = msgs[++mi % msgs.length];
  }, 900);

  const srcImg = await loadImage(capturedDataURL);

  for (let i = 0; i < HAIRSTYLES.length; i++) {
    const s = HAIRSTYLES[i];

    const canvas  = document.createElement('canvas');
    canvas.width  = srcImg.naturalWidth  || 640;
    canvas.height = srcImg.naturalHeight || 480;
    const ctx = canvas.getContext('2d');

    ctx.filter = s.filter;
    ctx.drawImage(srcImg, 0, 0);
    ctx.filter = 'none';

    if (s.tint) {
      ctx.fillStyle = s.tint;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    applyOverlay(ctx, canvas.width, canvas.height, s.overlay);
    drawWatermark(ctx, canvas.width, canvas.height, s.emoji + ' ' + s.name);

    generatedImages.push({
      name:    s.name,
      id:      s.id,
      emoji:   s.emoji,
      dataURL: canvas.toDataURL('image/jpeg', 0.88),
    });

    loadingBar.style.width = Math.round(((i + 1) / HAIRSTYLES.length) * 100) + '%';
    await sleep(70 + Math.random() * 60);
  }

  clearInterval(msgTimer);
  loadingBar.style.width = '100%';
  await sleep(300);

  loadingState.style.display  = 'none';
  renderGrid();
  hairstyleGrid.style.display = 'grid';
}

/* ── Canvas helpers ── */
function applyOverlay(ctx, w, h, type) {
  if (type === 'vignette') {
    const r = ctx.createRadialGradient(w/2,h/2,h*.3,w/2,h/2,h*.75);
    r.addColorStop(0,'transparent'); r.addColorStop(1,'rgba(0,0,0,.45)');
    ctx.fillStyle = r; ctx.fillRect(0,0,w,h);
  } else if (type === 'warm') {
    const g = ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'rgba(255,180,60,.12)'); g.addColorStop(1,'rgba(255,90,30,.12)');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  } else if (type === 'cool') {
    const g = ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'rgba(60,130,255,.12)'); g.addColorStop(1,'rgba(0,200,255,.12)');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  } else if (type === 'bw') {
    const id = ctx.getImageData(0,0,w,h), d = id.data;
    for (let i=0;i<d.length;i+=4) {
      const g = d[i]*.299 + d[i+1]*.587 + d[i+2]*.114;
      d[i]=d[i+1]=d[i+2]=g;
    }
    ctx.putImageData(id,0,0);
  } else if (type === 'vivid') {
    const g = ctx.createLinearGradient(0,0,w,0);
    g.addColorStop(0,'rgba(255,60,172,.18)');
    g.addColorStop(.5,'rgba(0,200,255,.12)');
    g.addColorStop(1,'rgba(123,47,255,.18)');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
  }
}

function drawWatermark(ctx, w, h, label) {
  const fs  = Math.max(12, Math.round(w * 0.03));
  ctx.save();
  ctx.font  = `bold ${fs}px Orbitron, monospace`;
  const mtr = ctx.measureText(label);
  const pad = fs * 0.5, bx = pad * 0.6, by = h - fs * 2.4;
  const bw  = mtr.width + pad * 2, bh = fs * 1.6;
  ctx.fillStyle = 'rgba(7,11,16,.76)';
  roundRect(ctx, bx, by, bw, bh, 6); ctx.fill();
  ctx.fillStyle = '#00c8ff';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, bx + pad, by + bh / 2);
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ════════════════════════════════
   RENDER GRID
════════════════════════════════ */
function renderGrid() {
  hairstyleGrid.innerHTML = '';
  generatedImages.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'hairstyle-card';
    card.style.animationDelay = `${i * 55}ms`;
    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${item.dataURL}" alt="${item.name}" loading="lazy" />
        <div class="card-badge">${item.emoji}</div>
      </div>
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <button class="card-dl" data-i="${i}">⬇ Download</button>
      </div>`;
    hairstyleGrid.appendChild(card);
  });
  hairstyleGrid.querySelectorAll('.card-dl').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.i;
      downloadImage(generatedImages[idx].dataURL, generatedImages[idx].name);
    });
  });
}

/* ════════════════════════════════
   DOWNLOAD
════════════════════════════════ */
function downloadImage(dataURL, label) {
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = `hairlens-${label.toLowerCase().replace(/\s+/g,'-')}.jpg`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast(`Downloaded: ${label}`);
}

async function downloadAllImages() {
  if (!generatedImages.length) return;
  showToast('Downloading all hairstyles…');
  for (const img of generatedImages) {
    downloadImage(img.dataURL, img.name);
    await sleep(320);
  }
}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function goToCamera() {
  resultsSection.style.display = 'none';
  cameraSection.style.display  = 'block';
  loadingBar.style.width       = '0%';
  hairstyleGrid.innerHTML      = '';
  hairstyleGrid.style.display  = 'none';
  generatedImages              = [];

  /* Clean up any uploaded still */
  const still = document.getElementById('uploadedStill');
  if (still) still.remove();
  videoFeed.style.display    = 'block';
  switchCamBtn.style.display = 'flex';
  cameraControls.style.display = 'none';
  previewWrapper.style.display = 'none';
  captureBtn.style.display   = 'none';
  retakeBtn.style.display    = 'none';
  showOverlay(camPrompt);
}

function showOverlay(el) { el.style.display = 'flex'; }
function hideOverlay(el) { el.style.display = 'none'; }

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastTimer;
function showToast(msg, ms = 2800) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}

/* ════════════════════════════════
   EVENTS
════════════════════════════════ */
startCamBtn.addEventListener('click',    initCamera);
retryCamBtn.addEventListener('click',    initCamera);
retryUploadBtn.addEventListener('click', triggerUpload);
uploadBtn.addEventListener('click',      triggerUpload);
switchCamBtn.addEventListener('click',   switchCamera);
captureBtn.addEventListener('click',     captureImage);
retakeBtn.addEventListener('click',      retakePhoto);
generateBtn.addEventListener('click',    generateHairstyles);
downloadAllBtn.addEventListener('click', downloadAllImages);
newPhotoBtn.addEventListener('click',    goToCamera);

/* ════════════════════════════════
   INIT
════════════════════════════════ */
(function init() {
  /* camPrompt shown by default — user taps to proceed */
  /* If on file:// show a soft warning in the prompt */
  if (location.protocol === 'file:') {
    document.getElementById('promptNote').style.display = 'block';
  }
})();
</script>
